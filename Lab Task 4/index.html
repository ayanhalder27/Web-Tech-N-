<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Text Analysis Tool</h1>

        <textarea id="text-input" placeholder="Paste your paragraph here..."></textarea>

        <button id="analyze-btn">Analyze Text</button>

        <div class="result-box">
            <h2>Results</h2>
            <p><strong>Character Count:</strong> <span id="char-count">0</span></p>
            <p><strong>Word Count:</strong> <span id="word-count">0</span></p>
            <p><strong>Reversed Text:</strong></p>
            <div id="reversed-text" class="output-text">---</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
